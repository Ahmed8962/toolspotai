<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&amp;display=swap');
    </style>
  </defs>
  <!-- Icon -->
  <rect x="0" y="0" width="80" height="80" rx="16" fill="#2563EB"/>
  <polygon points="44,10 32,38 40,38 35,70 56,40 47,40" fill="white"/>
  <!-- Wordmark: dx after ToolSpot keeps t/A separated when SVG is used as <img> (fonts inside SVG do not load there; Outfit only applies when SVG is opened as a document). -->
  <text x="96" y="58" font-family="Outfit, system-ui, sans-serif" font-size="52">
    <tspan font-weight="400" fill="#0F172A" letter-spacing="-0.5">ToolSpot</tspan><tspan font-weight="700" fill="#2563EB" dx="4">AI</tspan>
  </text>
</svg>
